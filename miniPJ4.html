<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/60bdabfed7.js" crossorigin="anonymous"></script>
    <link href="./css/miniPJ4.css" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="black-bg">
        <div class="white-bg">
            <form action="success.html" id="login-form">
                <h5>성함</h5>
                <div class="my-3">
                    <input type="text" class="form-control" placeholder="">
                </div>
                <h5>연락처</h5>
                <div class="my-3">
                    <input type="text" class="form-control" placeholder="">
                </div>
                <button type="button" class="btn btn-dark" id="submit">입력완료</button>
                <button type="button" class="btn btn-dark" id="close">닫기</button>
            </form>
        </div>
    </div>
    <div class="canvas-container">
        <canvas width="800" height="700" class="canvas"></canvas>
        <button>확인 및 닫기</button>
    </div>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark ps-3">
        <span class="nav-item navbar-brand" href="#">집꾸미기</span>
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">스토어</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">시공견적</a>
            </li>
        </ul>
    </nav>
    <div class="main-background p-4">

        <input type="text" placeholder="검색어입력" class="" id="search-box">

        <div class="card-container py-3">
        </div>
        <div style="display: block; clear: both;"></div>

        <div class="cart-container my-3 p-3">
            <h2>장바구니</h2>
            <div class="cart p-4">
                <p>여기로 드래그</p>
            </div>
        </div>

        <div class="footer">
            <h3>최종가격</h3>
            <p>합계:</p>
            <button type="button" class="btn btn-dark">구매하기</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

    <script src="./miniPJ4.js"></script>

</html>
