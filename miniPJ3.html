<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/60bdabfed7.js" crossorigin="anonymous"></script>
    <link href="./css/miniPJ3.css" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-menu">
            <i class="fa-solid fa-house"></i>
            <p>Home</p>
        </div>
        <div class="sidebar-menu">
            <i class="fa-solid fa-headphones"></i>
            <p>Services</p>
        </div>
        <div class="sidebar-menu">
            <i class="fa-solid fa-flag"></i>
            <p>Alerts</p>
        </div>
        <div class="sidebar-menu">
            <i class="fa-solid fa-chart-pie"></i>
            <p>Stats</p>
        </div>
    </div>

    <div class="nav-box row">
        <div class="nav-md shadow order-1 order-sm-3">
            <div class="nav-search">
                <input type="search" placeholder="Search" class="form-control rounded-start">
                <button class="rounded-end"><i class="fa-solid fa-magnifying-glass"></i></button>
                <div class="clear-box"></div>
            </div>
            <div class="nav-icon">
                <i class="fa-solid fa-bell">
                    <span class="position-absolute top-0 start-100 translate-middle badge bg-danger">99+</span>
                </i>
                <div style="height:100%; float: left;margin-left: 20px;"></div>
                <i class="fa-solid fa-envelope">
                    <span class="position-absolute top-0 start-100 translate-middle badge bg-danger">99+</span>
                </i>
                <p>KINSUNWOO</p>
                <div class="clear-box"></div>
            </div>
        </div>

        <div class="order-2" style="width:100%;height: 50px;"></div>

        <div class="nav-sm shadow order-3 order-sm-1">
            <button><i class="fa-solid fa-bars"></i></button>
            <div class="clear-box"></div>
        </div>
    </div>
    <div class="dashboard">
        <h2>Dashboard</h2>
        <div class="dashboard-main">
            <div class="row dashboard-first">
                <div class="first-content col-12 col-sm-3">
                    <div class="shadow" style="border-left: 5px solid #87ceeb;">
                        <p>Earnings (Monthly)</p>
                        <h5>$400,000</h5>
                        <i class="fa-solid fa-calendar"></i>
                    </div>
                </div>
                <div class="first-content col-12 col-sm-3">
                    <div class="shadow" style="border-left: 5px solid #43ca5d;">
                        <p>Earnings (Annual)</p>
                        <h5>$400,000</h5>
                        <i class="fa-solid fa-dollar-sign"></i>
                    </div>
                </div>
                <div class="first-content col-12 col-sm-3">
                    <div class="shadow" style="border-left: 5px solid #494cb4;">
                        <p>Task</p>
                        <h5>13</h5>
                        <i class="fa-solid fa-list-check"></i>
                    </div>
                </div>
                <div class="first-content col-12 col-sm-3">
                    <div class="shadow" style="border-left: 5px solid #ffcb55;">
                        <p>Requests</p>
                        <h5>26</h5>
                        <i class="fa-solid fa-comments"></i>
                    </div>
                </div>
            </div>

            <div class="row dashboard-second">
                <div class="second-content col-12 col-sm-8">
                    <ul class="list-group shadow">
                        <li class="list-group-item list-title">Earnings Overview</li>
                        <li class="list-group-item">
                            <div>
                                <canvas id="myChart"></canvas>
                            </div>
                        </li>
                    </ul>
                </div>
                <div class="second-content col-12 col-sm-4">
                    <ul class="list-group shadow">
                        <li class="list-group-item list-title">Tasks</li>
                        <li class="list-group-item">
                            Borrowed Items
                            <span class="badge rounded-pill text-bg-primary">99+</span>
                        </li>
                        <li class="list-group-item">
                            Trello Requests
                            <span class="badge rounded-pill text-bg-primary">11</span>
                        </li>
                        <li class="list-group-item">
                            Marked Comments
                            <span class="badge rounded-pill text-bg-primary">13</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
                datasets: [{
                    label: '# of Votes',
                    data: [12, 19, 3, 5, 2, 3],
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
